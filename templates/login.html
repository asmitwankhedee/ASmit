<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - RoadVision AI</title>
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Outfit:wght@500;700&display=swap"
        rel="stylesheet">
    <!-- Stylesheet -->
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <style>
        .login-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            flex: 1;
            width: 100%;
        }

        .message-text {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-top: 1rem;
        }

        .success-text {
            color: var(--accent-color);
        }

        .error-text {
            color: var(--danger);
        }

        /* From Uiverse.io by yashasvi9199 */ 
        .form {
          display: flex;
          flex-direction: column;
          gap: 15px;
          padding: 2.5em;
          background-color: #171717;
          border-radius: 25px;
          transition: 0.4s ease-in-out;
        }

        .card {
          width: 420px;
          max-width: 90vw;
          background-image: linear-gradient(163deg, #00ff75 0%, #3700ff 100%);
          border-radius: 22px;
          transition: all 0.3s;
          padding: 3px;
        }

        .card2 {
          border-radius: 0;
          transition: all 0.2s;
          background-color: #171717;
          border-radius: 20px;
        }

        .card2:hover {
          transform: scale(0.98);
          border-radius: 20px;
        }

        .card:hover {
          box-shadow: 0px 0px 30px 1px rgba(0, 255, 117, 0.3);
        }

        #heading {
          text-align: center;
          margin: 2em;
          color: rgb(255, 255, 255);
          font-size: 1.2em;
        }

        .field {
          display: flex;
          align-items: center;
          justify-content: center;
          gap: 0.5em;
          border-radius: 25px;
          padding: 0.6em;
          border: none;
          outline: none;
          color: white;
          background-color: #171717;
          box-shadow: inset 2px 5px 10px rgb(5, 5, 5);
        }

        .input-icon {
          height: 1.3em;
          width: 1.3em;
          fill: white;
        }

        .input-field {
          background: none;
          border: none;
          outline: none;
          width: 100%;
          color: #d3d3d3;
        }

        .form .btn {
          display: flex;
          justify-content: center;
          flex-direction: row;
          margin-top: 2.5em;
          margin-bottom: 2em;
        }

        .button1 {
          padding: 0.5em;
          padding-left: 1.1em;
          padding-right: 1.1em;
          border-radius: 5px;
          margin-right: 0.5em;
          border: none;
          outline: none;
          transition: 0.4s ease-in-out;
          background-color: #252525;
          color: white;
          cursor: pointer;
        }

        .button1:hover {
          background-color: black;
          color: white;
        }

        /* Sleek Modern Tab Switcher */
        .tabs-container {
            display: flex;
            background-color: #0b0b0b;
            border-radius: 14px;
            padding: 4px;
            margin-bottom: 1.5rem;
            box-shadow: inset 1px 1px 5px rgba(0, 0, 0, 0.8);
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 11px;
            background: none;
            color: #7a7a7a;
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            font-size: 0.92rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .tab-btn.active {
            background-color: #222222;
            color: #00ff75;
            box-shadow: 0 0 15px rgba(0, 255, 117, 0.15);
        }

        #heading {
            margin: 1em 0 1.5em 0 !important;
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            letter-spacing: 0.5px;
        }
    </style>
</head>

<body>
    <div class="app-container">
        <!-- Header -->
        <header>
            <div class="logo">RoadVision<span>AI</span></div>
            <p>Secure Portal Login & Registration</p>
        </header>

        <main class="login-wrapper">
            <div class="card">
                <div class="card2">
                    <form class="form" id="loginForm">
                        <!-- Elegant Switcher Tab -->
                        <div class="tabs-container">
                            <button type="button" class="tab-btn active" id="tabSignIn">SIGN IN</button>
                            <button type="button" class="tab-btn" id="tabSignUp">SIGN UP</button>
                        </div>

                        <p id="heading">Sign In to Your Account</p>
                        
                        <div id="step1">
                            <!-- Registration Name Field (hidden by default) -->
                            <div class="field hidden" id="nameField" style="margin-bottom: 15px;">
                                <svg viewBox="0 0 16 16" fill="currentColor" height="16" width="16" xmlns="http://www.w3.org/2000/svg" class="input-icon">
                                    <path d="M8 8a3 3 0 1 0 0-6 3 3 0 0 0 0 6zm2-3a2 2 0 1 1-4 0 2 2 0 0 1 4 0zm4 8c0 1-1 1-1 1H3s-1 0-1-1 1-4 6-4 6 3 6 4zm-1-.007C12.977 11.43 11.758 10 8 10S3.023 11.43 2.007 12.993C2.016 13 2.03 13 2.046 13h11.908c.015 0 .029 0 .038-.007z"></path>
                                </svg>
                                <input type="text" id="fullname" name="fullname" class="input-field" placeholder="Full Name" autocomplete="off" />
                            </div>

                            <div class="field">
                                <svg viewBox="0 0 16 16" fill="currentColor" height="16" width="16" xmlns="http://www.w3.org/2000/svg" class="input-icon">
                                    <path d="M13.106 7.222c0-2.967-2.249-5.032-5.482-5.032-3.35 0-5.646 2.318-5.646 5.702 0 3.493 2.235 5.708 5.762 5.708.862 0 1.689-.123 2.304-.335v-.862c-.43.199-1.354.328-2.29.328-2.926 0-4.813-1.88-4.813-4.798 0-2.844 1.921-4.881 4.594-4.881 2.735 0 4.608 1.688 4.608 4.156 0 1.682-.554 2.769-1.416 2.769-.492 0-.772-.28-.772-.76V5.206H8.923v.834h-.11c-.266-.595-.881-.964-1.6-.964-1.4 0-2.378 1.162-2.378 2.823 0 1.737.957 2.906 2.379 2.906.8 0 1.415-.39 1.709-1.087h.11c.081.67.703 1.148 1.503 1.148 1.572 0 2.57-1.415 2.57-3.643zm-7.177.704c0-1.197.54-1.907 1.456-1.907.93 0 1.524.738 1.524 1.907S8.308 9.84 7.371 9.84c-.895 0-1.442-.725-1.442-1.914z"></path>
                                </svg>
                                <input type="email" id="email" name="email" class="input-field" placeholder="Email Address" autocomplete="off" required />
                            </div>

                            <div class="field" style="margin-top: 15px;">
                                <svg viewBox="0 0 16 16" fill="currentColor" height="16" width="16" xmlns="http://www.w3.org/2000/svg" class="input-icon">
                                    <path d="M8 1a2 2 0 0 1 2 2v4H6V3a2 2 0 0 1 2-2zm3 6V3a3 3 0 0 0-6 0v4a2 2 0 0 0-2 2v5a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"></path>
                                </svg>
                                <input type="password" id="password" name="password" class="input-field" placeholder="Password" required />
                            </div>

                            <div class="btn" style="flex-direction: column; gap: 10px; align-items: center;">
                                <button type="button" id="sendOtpBtn" class="button1" style="width: 100%; margin: 0;">Send Verification OTP</button>
                            </div>
                        </div>

                        <div id="step2" class="hidden">
                            <div class="field" style="margin-top: 15px;">
                                <svg viewBox="0 0 16 16" fill="currentColor" height="16" width="16" xmlns="http://www.w3.org/2000/svg" class="input-icon">
                                    <path d="M8 1a2 2 0 0 1 2 2v4H6V3a2 2 0 0 1 2-2zm3 6V3a3 3 0 0 0-6 0v4a2 2 0 0 0-2 2v5a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"></path>
                                </svg>
                                <input type="text" id="otp" name="otp" class="input-field" maxlength="6" pattern="\d{6}" placeholder="Enter 6-Digit OTP">
                            </div>
                            <div id="otpTimerContainer" style="margin-top: 15px; text-align: center; font-size: 0.95rem; color: var(--text-secondary);">
                                OTP expires in: <span id="otpTimer" style="color: #f59e0b; font-weight: bold; font-family: monospace;">30</span>s
                            </div>
                            <div id="resendOtpContainer" class="hidden" style="margin-top: 15px; text-align: center;">
                                <button type="button" id="resendOtpBtn" class="button1" style="width: 100%; margin: 0; background-color: var(--primary-color);">Resend / Generate New OTP</button>
                            </div>
                            <div class="btn" style="flex-direction: column; gap: 10px; align-items: center; margin-top: 1.5em; margin-bottom: 1.5em;">
                                <button type="submit" id="loginBtn" class="button1" style="width: 100%; margin: 0;">Verify & Login</button>
                            </div>
                        </div>
                        
                        <div id="loginMessage" class="message-text" style="text-align: center; margin-bottom: 1em;"></div>
                    </form>
                </div>
            </div>
        </main>

        <footer>
            <p>&copy; POTHOLES AND CRACKS DETECTOR. ALL RIGHTS RESERVED.</p>
        </footer>
    </div>
    <script src="{{ url_for('static', filename='login.js') }}"></script>
</body>

</html>
